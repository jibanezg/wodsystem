<style>
.wod-unified-triggers-dialog .trigger-list {
    max-height: 400px;
    overflow-y: auto;
}
.wod-unified-triggers-dialog .trigger-item {
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 10px;
    margin-bottom: 10px;
    background: #f9f9f9;
}
.wod-unified-triggers-dialog .trigger-item:hover {
    background: #f0f0f0;
}
.wod-unified-triggers-dialog .no-triggers {
    text-align: center;
    color: #666;
    font-style: italic;
    padding: 20px;
}
.wod-unified-triggers-dialog .add-trigger-btn {
    background: #28a745;
    color: white;
    border: none;
    border-radius: 4px;
    padding: 10px 20px;
    cursor: pointer;
    font-weight: bold;
    margin-top: 10px;
}
.wod-unified-triggers-dialog .add-trigger-btn:hover {
    background: #218838;
}
</style>

<div class="wod-unified-triggers-dialog">
    <h2>🔥 UNIFIED DIALOG - WoD Triggers - {{documentTitle}}</h2>
    <div class="trigger-list">
        {{{renderedContent}}}
    </div>
    <button type="button" class="add-trigger-btn">
        <i class="fas fa-plus"></i> Add Trigger
    </button>
</div>
