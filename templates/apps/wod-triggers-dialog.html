<form class="flexcol" autocomplete="off">
    <style>
        .wod-triggers-dialog {
            padding: 15px;
            height: 100%;
        }
        .wod-triggers-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 2px solid #dc3545;
        }
        .wod-triggers-header h3 {
            margin: 0;
            color: #dc3545;
            font-size: 18px;
        }
        .wod-triggers-content {
            min-height: 300px;
            overflow-y: auto;
        }
        .wod-triggers-content:empty::before {
            content: "No triggers configured. Click the circular button below to create one.";
            color: #6c757d;
            font-style: italic;
            display: block;
            text-align: center;
            padding: 40px;
        }
    </style>
    
    <div class="wod-triggers-dialog">
        <div class="wod-triggers-header">
            <h3>🛡️ WoD Triggers</h3>
        </div>
        <div class="wod-triggers-content">
            {{{triggers}}}
        </div>
    </div>
</form>
